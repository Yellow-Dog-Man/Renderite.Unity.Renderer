name: 'Build the Unity Runtime'

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  build-runtime:
    name: 'Build the Unity Runtime'
    runs-on: ubuntu-latest

    environment: ${{ github.event.pull_request.head.repo.fork == 'true' && 'MR' || 'Production' }}

    env:
      IS_EXTERNAL: ${{ github.event.pull_request.head.repo.fork == 'true' }}

    steps:
      - name: 'Generate a token'
        id: generate-token
        if: ${{ env.IS_EXTERNAL != 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_CLONE_TOKEN_ID }}
          private-key: ${{ secrets.GH_APP_CLONE_TOKEN_SECRET }}
          owner: ${{ github.repository_owner }}
          repositories:
            Renderite.Unity.Renderer.UMP

      - name: 'Mask generated variable'
        if: ${{ env.IS_EXTERNAL != 'true' }}
        shell: bash
        run: echo "::add-mask::${{ steps.generate-token.outputs.token }}"

      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          path: 'UnityRuntime'
          token: ${{ env.IS_EXTERNAL == 'true' && github.token || steps.generate-token.outputs.token }}
          submodules: ${{ github.event_name != 'pull_request' }}

      - name: 'Remove UMP Directory on external PR'
        if: ${{ env.IS_EXTERNAL == 'true' }}
        working-directory: 'UnityRuntime'
        run: rm -rf Assets/UniversalMediaPlayer

      - name: 'Install Unity'
        uses: buildalon/unity-setup@ab626823a2d32033d5a7811169d0ce92e8010d38 # v2.3.0
        id: unity-setup
        with:
          unity-version: '2019.4.19f1'
          modules: |
            windows-mono
          cache-installation: 'true'

      - name: 'Activate Unity license'
        uses: buildalon/activate-unity-license@ed044477f266bebc3b0bc5270ac3b29782e76116 # v2.1.0
        with:
          license: 'personal'
          username: '${{ secrets.UNITY_CI_USERNAME }}'
          password: '${{ secrets.UNITY_CI_PASSWORD }}'

      - name: 'Build Unity Runtime'
        run: ${{ steps.unity-setup.outputs.unity-editor-path }} -quit -batchmode -nographics -projectPath UnityRuntime/ -buildTarget StandaloneWindows64 -executeMethod AppBuilder.BuildWindows
